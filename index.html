<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stellar Neighborhood</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #000; }
  body { font-family: 'Helvetica Neue', sans-serif; color: #fff; }
  #viewport { position: fixed; inset: 0; overflow: hidden; }
  canvas { display: block; }
  body, body * { -webkit-user-select: none; user-select: none; }
  #detail { -webkit-user-select: text; user-select: text; }
  #detail * { -webkit-user-select: text; user-select: text; }
  [data-star-label] { transition: opacity 0.15s, text-shadow 0.15s, color 0.15s; }
  .system-members { color: #aaa; font-size: 9px; font-weight: normal; white-space: nowrap; text-align: center; }
  .system-member-list { margin-top: 6px; }
  .system-member-row { color: #bbb; font-size: 11px; padding: 1px 0; }
  .member-spect { color: #777; font-size: 10px; }
  #info {
    position: absolute; top: 16px; left: 16px;
    padding: 12px 16px;
    font-size: 13px; line-height: 1.6; pointer-events: auto;
    z-index: 20;
    background: rgba(0,0,0,0.78); border: 1px solid rgba(255,255,255,0.15);
    border-radius: 8px;
    transition: border-color 0.15s;
    cursor: pointer;
    min-width: 220px;
  }
  #info:hover { border-color: rgba(255,255,255,0.4); }
  #info .info-icon {
    display: none;
    align-items: center; justify-content: center;
    width: 24px; height: 24px;
    font: 600 24px/1 Georgia, 'Times New Roman', serif;
    color: #ccc;
    padding: 18px 20px;
  }
  #info.collapsed { padding: 0; min-width: 0; }
  #info.collapsed .info-body { display: none; }
  #info.collapsed .info-icon { display: inline-flex; }
  #detail:hover { border-color: rgba(255,255,255,0.4); }
  #detail { transition: border-color 0.15s; }
  #info h1 { font-size: 16px; margin-bottom: 4px; font-weight: 600; }
  #info .hint { color: #888; font-size: 11px; }
  @media (hover: none) and (pointer: coarse) {
    #info { top: 8px; left: 8px; padding: 6px 8px; }
    #info h1 { font-size: 14px; margin-bottom: 0; }
    #info .hint { display: none; }
    #detail { bottom: 8px; left: 8px; padding: 8px 12px; }
  }
  #detail {
    position: absolute; bottom: 16px; left: 16px; display: none;
    background: #000; padding: 12px 16px; border-radius: 8px;
    font-size: 12px; line-height: 1.5;
    border: 1px solid rgba(255,255,255,0.15); z-index: 20;
    max-width: 320px; max-height: 60vh; overflow-y: auto; user-select: text;
  }
  #detail.active { display: block; }
  #detail .star-name { font-weight: 600; font-size: 15px; margin-bottom: 2px; }
  #detail { cursor: pointer; }
  #detail.collapsed .detail-body { display: none; }
  #detail .star-aliases { color: #777; font-size: 10px; margin-bottom: 4px; }
  #detail .star-detail { color: #aaa; font-size: 11px; }
  #detail .star-notes { color: #999; font-size: 11px; margin-top: 6px; }
  #detail .star-wiki { margin-top: 6px; }
  #detail .star-wiki a { color: #6699dd; font-size: 12px; text-decoration: none; }
  #detail .star-wiki a:hover { text-decoration: underline; }
  #search-btn {
    position: absolute; top: 16px; right: 16px;
    background: #000; border: 1px solid rgba(255,255,255,0.2);
    border-radius: 8px; color: #888; font-size: 22px;
    width: 36px; height: 36px; cursor: pointer; z-index: 20;
    display: flex; align-items: center; justify-content: center;
    transition: border-color 0.15s;
  }
  #search-btn:hover { border-color: rgba(255,255,255,0.4); color: #ccc; }
  #search-btn.hidden { display: none; }
  #search {
    position: absolute; top: 16px; right: 16px;
    display: none; flex-direction: column;
    background: #000; border-radius: 8px;
    border: 1px solid rgba(255,255,255,0.2); z-index: 20;
    width: 260px; overflow: hidden;
  }
  #search.active { display: flex; }
  #search-input {
    background: transparent; border: none; outline: none;
    color: #fff; font-size: 16px; padding: 10px 12px;
    font-family: 'Helvetica Neue', sans-serif;
    border-bottom: 1px solid rgba(255,255,255,0.1);
  }
  #search-input::placeholder { color: #666; }
  #search-results {
    max-height: 240px; overflow-y: auto;
    list-style: none;
  }
  #search-results li {
    padding: 6px 12px; cursor: pointer;
    font-size: 13px; color: #ccc;
  }
  #search-results li.selected {
    background: rgba(68,102,170,0.4); color: #fff;
  }
  #search-results li:hover { background: rgba(255,255,255,0.08); }
  .search-secondary { color: #777; font-size: 11px; margin-left: 6px; }
  #debug-panel {
    position: fixed; bottom: 12px; right: 12px; z-index: 100;
    background: rgba(0,0,0,0.78); border: 1px solid rgba(120,160,220,0.35);
    border-radius: 8px;
    color: #cde; font: 11px/1.5 monospace;
    min-width: 220px;
    transition: border-color 0.15s;
    cursor: pointer;
    -webkit-user-select: text; user-select: text;
  }
  #debug-panel * { -webkit-user-select: text; user-select: text; }
  #debug-panel:hover { border-color: rgba(180,210,255,0.7); }
  #debug-panel .debug-body {
    padding: 10px 14px;
  }
  #debug-panel .debug-bug {
    display: none;
    align-items: center; justify-content: center;
    padding: 8px;
    color: #6aaeff;
  }
  #debug-panel.collapsed { min-width: 0; }
  #debug-panel.collapsed .debug-body { display: none; }
  #debug-panel.collapsed .debug-bug { display: inline-flex; }
</style>
</head>
<body>
<div id="viewport">
<div id="info" class="collapsed">
  <div class="info-icon">i</div>
  <div class="info-body">
    <h1>Stellar Neighborhood</h1>
    <div>1.86 million stars within ~3,260 light-years of Sol</div>
    <div class="hint">Drag to rotate &middot; ⌥+drag to zoom &middot; / search &middot; L labels &middot; G grid &middot; C constellations &middot; D dust</div>
  </div>
</div>
<div id="detail"></div>
<button id="search-btn" aria-label="Search"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="10" cy="10" r="7"/><line x1="15" y1="15" x2="21" y2="21"/></svg></button>
<div id="search">
  <input id="search-input" type="text" placeholder="Search stars..." autocomplete="off" />
  <ul id="search-results"></ul>
</div>
<script type="module" src="./src/main.ts"></script>
</div>
</body>
</html>
