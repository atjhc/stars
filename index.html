<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stellar Neighborhood</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #000; overflow: hidden; font-family: 'Helvetica Neue', sans-serif; color: #fff; }
  canvas { display: block; }
  body, body * { -webkit-user-select: none; user-select: none; }
  #detail { -webkit-user-select: text; user-select: text; }
  #detail * { -webkit-user-select: text; user-select: text; }
  [data-star-label] { transition: color 0.15s, text-shadow 0.15s; }
  .system-members { color: #aaa; font-size: 9px; font-weight: normal; white-space: nowrap; text-align: center; }
  .system-member-list { margin-top: 6px; }
  .system-member-row { color: #bbb; font-size: 11px; padding: 1px 0; }
  .member-spect { color: #777; font-size: 10px; }
  [data-star-label].highlight { color: #fff !important; text-shadow: 0 0 8px rgba(100,150,220,0.8), 0 0 4px #000 !important; }
  #info {
    position: absolute; top: 16px; left: 16px;
    background: #000; padding: 12px 16px; border-radius: 8px;
    font-size: 13px; line-height: 1.6; pointer-events: none;
    border: 1px solid rgba(255,255,255,0.1); z-index: 20;
  }
  #info h1 { font-size: 16px; margin-bottom: 4px; font-weight: 600; }
  #info .hint { color: #888; font-size: 11px; }
  #detail {
    position: absolute; bottom: 16px; left: 16px; display: none;
    background: #000; padding: 12px 16px; border-radius: 8px;
    font-size: 12px; line-height: 1.5;
    border: 1px solid rgba(255,255,255,0.15); z-index: 20;
    max-width: 320px; user-select: text;
  }
  #detail.active { display: block; }
  #detail .star-name { font-weight: 600; font-size: 15px; margin-bottom: 2px; }
  #detail .star-aliases { color: #777; font-size: 10px; margin-bottom: 4px; }
  #detail .star-detail { color: #aaa; font-size: 11px; }
  #detail .star-notes { color: #999; font-size: 11px; margin-top: 6px; }
  #detail .star-wiki { margin-top: 6px; }
  #detail .star-wiki a { color: #6699dd; font-size: 12px; text-decoration: none; }
  #detail .star-wiki a:hover { text-decoration: underline; }
  #search {
    position: absolute; top: 16px; right: 16px;
    display: none; flex-direction: column;
    background: #000; border-radius: 8px;
    border: 1px solid rgba(255,255,255,0.2); z-index: 20;
    width: 260px; overflow: hidden;
  }
  #search.active { display: flex; }
  #search-input {
    background: transparent; border: none; outline: none;
    color: #fff; font-size: 14px; padding: 10px 12px;
    font-family: 'Helvetica Neue', sans-serif;
    border-bottom: 1px solid rgba(255,255,255,0.1);
  }
  #search-input::placeholder { color: #666; }
  #search-results {
    max-height: 240px; overflow-y: auto;
    list-style: none;
  }
  #search-results li {
    padding: 6px 12px; cursor: pointer;
    font-size: 13px; color: #ccc;
  }
  #search-results li.selected {
    background: rgba(68,102,170,0.4); color: #fff;
  }
  #search-results li:hover { background: rgba(255,255,255,0.08); }
  .search-secondary { color: #777; font-size: 11px; margin-left: 6px; }
</style>
</head>
<body>
<div id="info">
  <h1>Stellar Neighborhood</h1>
  <div>Stars within ~33 light-years of Sol</div>
  <div class="hint">Drag to rotate &middot; ⌥+drag to zoom &middot; / search &middot; L labels &middot; G grid</div>
</div>
<div id="detail"></div>
<div id="search">
  <input id="search-input" type="text" placeholder="Search stars..." autocomplete="off" />
  <ul id="search-results"></ul>
</div>
<script type="module" src="./src/main.ts"></script>
</body>
</html>
