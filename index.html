<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stellar Neighborhood</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #000; overflow: hidden; font-family: 'Helvetica Neue', sans-serif; color: #fff; }
  canvas { display: block; }
  #info {
    position: absolute; top: 16px; left: 16px;
    background: rgba(0,0,0,0.7); padding: 12px 16px; border-radius: 8px;
    font-size: 13px; line-height: 1.6; pointer-events: none;
    border: 1px solid rgba(255,255,255,0.1);
  }
  #info h1 { font-size: 16px; margin-bottom: 4px; font-weight: 600; }
  #info .hint { color: #888; font-size: 11px; }
  #tooltip {
    position: absolute; display: none;
    background: rgba(0,0,0,0.85); padding: 8px 12px; border-radius: 6px;
    font-size: 12px; pointer-events: none; white-space: nowrap;
    border: 1px solid rgba(255,255,255,0.15);
  }
  #tooltip .star-name { font-weight: 600; font-size: 13px; }
  #tooltip .star-detail { color: #aaa; font-size: 11px; }
</style>
</head>
<body>
<div id="info">
  <h1>Stellar Neighborhood</h1>
  <div>Stars within ~10 parsecs of Sol</div>
  <div class="hint">Drag to rotate &middot; ⌥+drag to zoom &middot; Hover for details</div>
</div>
<div id="tooltip"></div>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { CSS2DRenderer, CSS2DObject } from 'three/addons/renderers/CSS2DRenderer.js';

const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(55, window.innerWidth / window.innerHeight, 0.01, 500);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(window.devicePixelRatio);
document.body.appendChild(renderer.domElement);

const labelRenderer = new CSS2DRenderer();
labelRenderer.setSize(window.innerWidth, window.innerHeight);
labelRenderer.domElement.style.position = 'absolute';
labelRenderer.domElement.style.top = '0';
labelRenderer.domElement.style.pointerEvents = 'none';
document.body.appendChild(labelRenderer.domElement);

// Color from B-V color index
function bvToColor(ci) {
  let t;
  let r, g, b;
  if (ci < -0.4) ci = -0.4;
  if (ci > 2.0) ci = 2.0;

  if (ci < 0.0) {
    t = (ci + 0.4) / 0.4;
    r = 0.6 + 0.4 * t;
    g = 0.7 + 0.3 * t;
    b = 1.0;
  } else if (ci < 0.4) {
    t = ci / 0.4;
    r = 1.0;
    g = 1.0 - 0.1 * t;
    b = 1.0 - 0.2 * t;
  } else if (ci < 0.8) {
    t = (ci - 0.4) / 0.4;
    r = 1.0;
    g = 0.9 - 0.2 * t;
    b = 0.8 - 0.4 * t;
  } else if (ci < 1.4) {
    t = (ci - 0.8) / 0.6;
    r = 1.0;
    g = 0.7 - 0.3 * t;
    b = 0.4 - 0.2 * t;
  } else {
    t = (ci - 1.4) / 0.6;
    r = 1.0 - 0.2 * t;
    g = 0.4 - 0.2 * t;
    b = 0.2 - 0.1 * t;
  }
  return new THREE.Color(r, g, b);
}

// Load stars
const starsData = await fetch('stars.json').then(r => r.json());

const SCALE = 3; // parsecs to scene units
const starGroup = new THREE.Group();
scene.add(starGroup);

const starObjects = [];

starsData.forEach((star, i) => {
  const color = bvToColor(star.ci);

  // Size based on luminosity (log scale, clamped)
  const lumSize = Math.max(0.03, Math.min(0.3, 0.04 + 0.06 * Math.log10(Math.max(star.lum, 0.001))));

  const geo = new THREE.SphereGeometry(lumSize, 12, 8);
  const mat = new THREE.MeshBasicMaterial({ color });
  const mesh = new THREE.Mesh(geo, mat);
  mesh.position.set(star.x * SCALE, star.z * SCALE, -star.y * SCALE);
  mesh.userData = star;
  starGroup.add(mesh);
  starObjects.push(mesh);

  // Glow sprite
  const spriteMat = new THREE.SpriteMaterial({
    map: makeGlowTexture(color),
    transparent: true,
    blending: THREE.AdditiveBlending,
    depthWrite: false,
    opacity: Math.min(1, 0.3 + star.lum * 0.1),
  });
  const sprite = new THREE.Sprite(spriteMat);
  const glowSize = lumSize * 6;
  sprite.scale.set(glowSize, glowSize, 1);
  mesh.add(sprite);

  // Label
  const labelDiv = document.createElement('div');
  labelDiv.style.cssText = `
    color: rgba(255,255,255,0.7); font-size: 10px; font-family: 'Helvetica Neue', sans-serif;
    pointer-events: none; white-space: nowrap; text-shadow: 0 0 4px #000;
  `;
  const displayName = star.name === 'ID 0' ? 'Sol' : star.name;
  labelDiv.textContent = displayName;
  const label = new CSS2DObject(labelDiv);
  label.position.set(0, lumSize + 0.06, 0);
  label.userData.star = star;
  mesh.add(label);
});

function makeGlowTexture(color) {
  const size = 128;
  const canvas = document.createElement('canvas');
  canvas.width = size;
  canvas.height = size;
  const ctx = canvas.getContext('2d');
  const gradient = ctx.createRadialGradient(size/2, size/2, 0, size/2, size/2, size/2);
  gradient.addColorStop(0, `rgba(${(color.r*255)|0},${(color.g*255)|0},${(color.b*255)|0},0.6)`);
  gradient.addColorStop(0.3, `rgba(${(color.r*255)|0},${(color.g*255)|0},${(color.b*255)|0},0.15)`);
  gradient.addColorStop(1, 'rgba(0,0,0,0)');
  ctx.fillStyle = gradient;
  ctx.fillRect(0, 0, size, size);
  const tex = new THREE.CanvasTexture(canvas);
  return tex;
}

// Grid aligned to the galactic plane, fixed at Sol.
// The HYG data is in equatorial coordinates (x=vernal equinox, z=north celestial pole).
// In our scene: scene_x = eq_x, scene_y = eq_z, scene_z = -eq_y.
// Galactic north pole in equatorial coords: RA=192.8595°, Dec=27.1284°
const raGNP = 192.8595 * Math.PI / 180;
const decGNP = 27.1284 * Math.PI / 180;
const galNorthEq = new THREE.Vector3(
  Math.cos(decGNP) * Math.cos(raGNP),
  Math.sin(decGNP),
  -Math.cos(decGNP) * Math.sin(raGNP)
); // already in scene axes (x, y=eq_z, z=-eq_y)

const gridHelper = new THREE.GridHelper(60, 30, 0x4466aa, 0x334477);
gridHelper.material.transparent = true;
gridHelper.material.opacity = 0.5;
// Rotate so the grid's "up" (Y axis) aligns with galactic north pole
const defaultUp = new THREE.Vector3(0, 1, 0);
const quat = new THREE.Quaternion().setFromUnitVectors(defaultUp, galNorthEq.normalize());
gridHelper.quaternion.copy(quat);
scene.add(gridHelper);

// Camera orbit controls (manual)
const target = new THREE.Vector3(0, 0, 0); // Sol
// Orbit state: distance, polar angle from galactic north, azimuth
let orbitRadius = 18;
let orbitPhi = 0.4;   // angle from galactic north (small = above the plane)
let orbitTheta = 0;
let isDragging = false;
let isZooming = false;
let prevMouse = { x: 0, y: 0 };

// Build an orthonormal basis for the galactic plane
const galUp = galNorthEq.clone().normalize();
// Pick a reference direction not parallel to galUp for the cross product
const ref = Math.abs(galUp.dot(new THREE.Vector3(1,0,0))) < 0.9
  ? new THREE.Vector3(1,0,0) : new THREE.Vector3(0,0,1);
const galX = new THREE.Vector3().crossVectors(galUp, ref).normalize();
const galZ = new THREE.Vector3().crossVectors(galX, galUp).normalize();

camera.up.copy(galUp);

function updateCamera() {
  // Spherical coordinates in the galactic basis
  const sinPhi = Math.sin(orbitPhi);
  const cosPhi = Math.cos(orbitPhi);
  const sinTheta = Math.sin(orbitTheta);
  const cosTheta = Math.cos(orbitTheta);
  camera.position.copy(target)
    .addScaledVector(galX, orbitRadius * sinPhi * cosTheta)
    .addScaledVector(galZ, orbitRadius * sinPhi * sinTheta)
    .addScaledVector(galUp, orbitRadius * cosPhi);
  camera.lookAt(target);
}
updateCamera();

let dragDistance = 0;

renderer.domElement.addEventListener('mousedown', (e) => {
  if (e.altKey) {
    isZooming = true;
  } else {
    isDragging = true;
  }
  prevMouse.x = e.clientX;
  prevMouse.y = e.clientY;
  dragDistance = 0;
});

window.addEventListener('mousemove', (e) => {
  const dx = e.clientX - prevMouse.x;
  const dy = e.clientY - prevMouse.y;
  if (isDragging) {
    dragDistance += Math.abs(dx) + Math.abs(dy);
    orbitTheta -= dx * 0.005;
    orbitPhi = Math.max(0.1, Math.min(Math.PI - 0.1, orbitPhi + dy * 0.005));
    updateCamera();
  } else if (isZooming) {
    dragDistance += Math.abs(dx) + Math.abs(dy);
    orbitRadius = Math.max(2, Math.min(100, orbitRadius + dy * 0.1));
    updateCamera();
  }
  prevMouse.x = e.clientX;
  prevMouse.y = e.clientY;
});

window.addEventListener('mouseup', (e) => {
  const wasClick = dragDistance < 5;
  isDragging = false;
  isZooming = false;

  if (wasClick) {
    const clickMouse = new THREE.Vector2(
      (e.clientX / window.innerWidth) * 2 - 1,
      -(e.clientY / window.innerHeight) * 2 + 1
    );
    raycaster.setFromCamera(clickMouse, camera);
    const hits = raycaster.intersectObjects(starObjects);
    if (hits.length > 0) {
      animateTargetTo(hits[0].object.position.clone());
    }
  }
});

// Smooth camera target animation
let animStart = null, animFrom = null, animTo = null;
const ANIM_DURATION = 600;

function animateTargetTo(dest) {
  animFrom = target.clone();
  animTo = dest;
  animStart = performance.now();
}

function tickAnimation(now) {
  if (!animStart) return;
  const t = Math.min(1, (now - animStart) / ANIM_DURATION);
  const ease = t < 0.5 ? 2 * t * t : 1 - Math.pow(-2 * t + 2, 2) / 2;
  target.lerpVectors(animFrom, animTo, ease);
  gridHelper.position.copy(target);
  updateCamera();
  if (t >= 1) animStart = null;
}

// Also support scroll wheel for zoom
renderer.domElement.addEventListener('wheel', (e) => {
  e.preventDefault();
  orbitRadius = Math.max(2, Math.min(100, orbitRadius + e.deltaY * 0.02));
  updateCamera();
}, { passive: false });

// Perpendicular drop line from hovered star to galactic plane
const dropLineGeo = new THREE.BufferGeometry().setFromPoints([
  new THREE.Vector3(), new THREE.Vector3()
]);
const dropLine = new THREE.Line(
  dropLineGeo,
  new THREE.LineBasicMaterial({ color: 0x4466aa, transparent: true, opacity: 0.6 })
);
dropLine.visible = false;
scene.add(dropLine);

// Hover tooltip via raycasting
const raycaster = new THREE.Raycaster();
raycaster.params.Points = { threshold: 0.5 };
const mouse = new THREE.Vector2();
const tooltip = document.getElementById('tooltip');

renderer.domElement.addEventListener('mousemove', (e) => {
  mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
  mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;

  raycaster.setFromCamera(mouse, camera);
  const intersects = raycaster.intersectObjects(starObjects);

  if (intersects.length > 0) {
    const star = intersects[0].object.userData;

    // Project star position onto galactic plane (plane through origin with normal galUp)
    const starPos = intersects[0].object.position;
    const planePos = starPos.clone().addScaledVector(galUp, -starPos.dot(galUp));
    const positions = dropLineGeo.attributes.position;
    positions.setXYZ(0, starPos.x, starPos.y, starPos.z);
    positions.setXYZ(1, planePos.x, planePos.y, planePos.z);
    positions.needsUpdate = true;
    dropLine.visible = true;
    const displayName = star.name === 'ID 0' ? 'Sol' : star.name;
    tooltip.innerHTML = `
      <div class="star-name">${displayName}</div>
      <div class="star-detail">
        Distance: ${star.dist.toFixed(2)} pc (${(star.dist * 3.262).toFixed(1)} ly)<br>
        Magnitude: ${star.mag.toFixed(1)} (abs: ${star.absmag.toFixed(1)})<br>
        Spectral: ${star.spect || '—'}<br>
        Luminosity: ${star.lum.toFixed(3)} L☉
      </div>
    `;
    tooltip.style.display = 'block';
    tooltip.style.left = (e.clientX + 16) + 'px';
    tooltip.style.top = (e.clientY - 10) + 'px';
  } else {
    tooltip.style.display = 'none';
    dropLine.visible = false;
  }
});

// Resize
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
  labelRenderer.setSize(window.innerWidth, window.innerHeight);
});

// Animate
function animate(now) {
  requestAnimationFrame(animate);
  tickAnimation(now);
  renderer.render(scene, camera);
  labelRenderer.render(scene, camera);
}
animate();
</script>
</body>
</html>
